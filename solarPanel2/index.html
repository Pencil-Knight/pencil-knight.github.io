<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>Калькулятор для расчета солнечных панелей</h1>
	<div class="wrapper">
		<p>Voc =</p>
	<input type="number" class="inputVoc" value="">
	<p>Vmp =</p>
	<input type="number" class="inputVmp" value="">
</div>
	<div class="wrapper">
		<p>Isc =</p>
	<input type="number" class="inputIsc" value="">
	<p>Imp =</p>
	<input type="number" class="inputImp" value="">
</div>
	<button class="btn">Рассчитать</button>
<div class="resistanse wrapper">
	R = Vmp/Imp = <div class="resistansResult"></div>
</div>
<div class="resistanse wrapper">
	R<sub>обр</sub> = (Voc-Vmp)/(Isc-Imp) = <div class="revResistansResult"></div>
</div>
<div class="resistanse wrapper">
	I<sub>обр</sub> = Vmp/(R+R<sub>обр</sub>) = <div class="revCurrentResult"></div>
</div>
<div class="resistanse wrapper">
	W<sub>обр</sub> = Vmp*I<sub>обр</sub> = <div class="revPowerResult"></div>
</div>













	<script src="main.js"></script>
</body>
</html>
